name: Setup Python Dependencies
description: Install JoinMarket NG Python dependencies with caching

inputs:
  python-version:
    description: Python version to use
    required: false
    default: '3.14'
  components:
    description: Comma-separated list of components to install (e.g., jmcore,jmwallet,maker)
    required: true
  install-dev:
    description: Install dev dependencies
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: |
          **/requirements*.txt
          **/pyproject.toml

    # jmcore depends on the Rust-backed `nwabisabi` crate (built via
    # maturin's PEP 517 backend during pip install). Without a Rust
    # toolchain on the runner the install would fall over with
    # "maturin failed; cargo not found". Pinning to stable; nwabisabi
    # has no nightly-only features.
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    # Cache the cargo registry + git index + the per-job target dir so
    # repeat CI runs do not redownload crates.io for every job. Keying
    # off the lockfile of the consuming pyproject.toml is enough; the
    # nwabisabi crate ships its own Cargo.lock that is fetched via the
    # git+ URL and does not appear in this repo.
    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: cargo-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: cargo-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: |
        IFS=',' read -ra COMPONENTS <<< "${{ inputs.components }}"
        DEV_FLAG=""
        if [ "${{ inputs.install-dev }}" = "true" ]; then
          DEV_FLAG="[dev]"
        fi

        for component in "${COMPONENTS[@]}"; do
          component=$(echo "$component" | xargs)  # trim whitespace
          echo "Installing $component..."
          pip install -e "${component}${DEV_FLAG}"
        done
